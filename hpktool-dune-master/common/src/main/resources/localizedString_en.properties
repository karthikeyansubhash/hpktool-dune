example=Example:
example_create1_without_application=--create --output ./ --solution-id 1234abcd-1234-1234-0000-12345678abcd --solution-name "Test Application" --solution-description "Test Sample Solution" --solution-vendor "HP Inc." --solution-version "1.0.0" --solution-version-number "1" --apk test.apk --platform-version 31.9
example_create2_with_config=--create --output ./ --solution-id 1234abcd-1234-1234-0000-12345678abcd --solution-name "Test Application" --solution-description "Test Sample Solution" --solution-vendor "HP Inc." --solution-version "1.0.0" --solution-version-number "1" --apk test.apk --platform-version 31.9 --default-config config.json
example_create3_with_application=--create --output ./ --solution-id 1234abcd-1234-1234-0000-12345678abcd --solution-name "Test Application" --solution-description "Test Sample Solution" --solution-vendor "HP Inc." --solution-version "1.0.0" --solution-version-number "1" --apk test.apk --platform-version 31.9 --application-id-main 11111111-1111-1111-0012-111111111111 --application-name-main "TestSample Main" --application-path-main "com.hp.test/com.hp.test.MainActivity" --application-title-main "{"en-US":""Test Sample""}" --application-description-main "{"en-US":"TestSample"}" --application-icon-main "ic_launcher.png" --application-icon-set-main "{"90x90":"ic_launcher.png","192x192":"ic_launcher.png"}"
example_create4_accessory=--create --output ./ --solution-id 1234abcd-1234-1234-0000-12345678abcd --solution-name "Test Application" --solution-description "Test Sample Solution" --solution-vendor "HP Inc." --solution-version "1.0.0" --solution-version-number "1" --apk test.apk --platform-version 31.9 --application-id-main 11111111-1111-1111-0002-111111111111 --application-name-main "TestSample Main" --application-path-main "com.hp.test/com.hp.test.MainActivity" --application-title-main "{"en-US":""Test Sample""}" --application-description-main "{"en-US":"TestSample"}" --application-icon-main "ic_launcher.png" --application-icon-set-main "{"90x90":"ic_launcher.png","192x192":"ic_launcher.png"}" --accessory-1 "OWNED,1008,69"
example_create5_agent=--create --output ./ --solution-id 11111111-1111-1111-9998-111111111111 --solution-name "PrintSample " --solution-description "PrintSample Solution" --solution-vendor "HP Inc." --solution-version "1.0.0" --solution-version-number "1" --apk test.apk --platform-version 31.9 --application-id-main 11111111-1111-1111-0017-111111111111 --application-name-main "TestSample Main" --application-path-main "com.hp.test/com.hp.test.MainActivity" --application-title-main "{"en-US":""Test Sample""}" --application-description-main "{"en-US":"TestSample"}" --application-icon-main "ic_launcher.png" --application-icon-set-main "{"90x90":"ic_launcher.png","192x192":"ic_launcher.png"}" --print-agent
example_json1=--json --output ./ --apk test.apk --manifest solution.json
example_json2_with_config=--json --output ./ --apk test.apk --manifest solution.json --default-config config.json
example_install=--install --install-file ./Test Application --host 192.168.1.1 --password 1234
example_uninstall=--uninstall --solution-id 1234abcd-1234-1234-0000-12345678abcd --host 192.168.1.1 --password 1234
example_solution_list=--solution-list --host 192.168.1.1 --password 1234
example_detailed_solution=--solution-detail --solution-id 1234abcd-1234-1234-0000-12345678abcd --host 192.168.1.1 --password 1234
example_get_config=--config-get --solution-id 1234abcd-1234-1234-0000-12345678abcd --host 192.168.1.1 --password 1234
example_update_config=--config-update --solution-id 1234abcd-1234-1234-0000-12345678abcd --host 192.168.1.1 --password 1234 --config-data "{"key":"value"}"
example_attestation_update=--attestation-update --solution-id 1234abcd-1234-1234-0000-12345678abcd --host 192.168.1.1 --password 1234 --username <hp.io_username> --ldbkey <hp.io_ldbkey> --attestation-data "{"client_id":"test_client_id","client_secret":"test_client_secret"}"

